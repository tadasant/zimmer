# Omakase Ruby styling for Rails
inherit_gem: { rubocop-rails-omakase: rubocop.yml }

# Exclude auto-generated Rails schema files from array bracket spacing rule
# These files are generated by Rails and shouldn't be manually modified
Layout/SpaceInsideArrayLiteralBrackets:
  Exclude:
    - 'db/schema.rb'
    - 'db/queue_schema.rb'
    - 'db/cable_schema.rb'
