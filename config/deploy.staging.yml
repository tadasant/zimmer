# Kamal staging destination. Merged over config/deploy.yml.
# Secrets are read from .kamal/secrets.staging.
#
# STAGING_HOST is injected by the deploy workflow as the droplet's TAILNET address
# (GitHub runners get no MagicDNS, so the workflow resolves the IP from
# `tailscale status --json` and exports it). Both roles and both accessories run on
# the single staging droplet.
servers:
  web:
    hosts:
      - <%= ENV["STAGING_HOST"] %>
    options:
      # tini-style PID 1 so agent-spawned grandchildren (gh, git, node, chrome,
      # claude) are reaped instead of piling up as zombies.
      init: true
      # Durable named volumes shared by web + worker so both see the same clones,
      # Claude credentials, and gh auth. They survive Kamal container swaps (the
      # whole point of a persistent host) -- state is no longer lost on every deploy.
      volume:
        - zimmer_data:/home/rails/.zimmer
        - claude_home:/home/rails/.claude
        - gh_config:/home/rails/.config/gh
        - claude_local:/home/rails/.local
  worker:
    hosts:
      - <%= ENV["STAGING_HOST"] %>
    # production.rb sets good_job.execution_mode = :external, so jobs only run if a
    # dedicated worker process is up. Same image/env/volumes as web.
    cmd: bundle exec good_job start
    proxy: false
    options:
      init: true
      volume:
        - zimmer_data:/home/rails/.zimmer
        - claude_home:/home/rails/.claude
        - gh_config:/home/rails/.config/gh
        - claude_local:/home/rails/.local
        # DockerCleanupJob prunes stale agent containers; it needs the host socket.
        - /var/run/docker.sock:/var/run/docker.sock

ssh:
  user: root

env:
  clear:
    # NOT "production". config/environments/staging.rb exists and is fully
    # production-shaped (eager_load, external GoodJob + cron, redis cache store),
    # and database.yml has a `staging:` section. Running staging as "production"
    # -- which the pre-Kamal cloud-init did -- makes SelfSessionInjector inject the
    # `agent-orchestrator-prod-self-session` MCP server, whose
    # ${AGENT_ORCHESTRATOR_PROD_API_KEY} lives only in production's encrypted
    # credentials. Every staging session then died in SecretsInterpolator before the
    # agent ever started.
    RAILS_ENV: staging
    # Canonical external host: the custom domain (Caddy terminates TLS on :443 in
    # front of kamal-proxy). Without this, McpOauthService falls back to
    # localhost:3000 and every OAuth callback breaks.
    APP_HOST: staging.zimmer.tadasant.com
    # Point the injected self-session MCP server at THIS instance, so a staging
    # session orchestrates staging (never production).
    AGENT_ORCHESTRATOR_STAGING_BASE_URL: https://staging.zimmer.tadasant.com
    DATABASE_HOST: zimmer-db
    DATABASE_PORT: "5432"
    DATABASE_USERNAME: zimmer
    # The throwaway Postgres accessory speaks no TLS.
    DATABASE_SSLMODE: prefer
  secret:
    - SECRET_KEY_BASE
    - API_KEYS
    - DATABASE_PASSWORD
    # The API key the injected self-session MCP server uses to call this instance's
    # own REST API. Staging has no RAILS_MASTER_KEY (so no encrypted mcp_secrets);
    # SecretsInterpolator falls back to process ENV, which is what this supplies.
    - AGENT_ORCHESTRATOR_STAGING_API_KEY
    # Observability. The app's initializers are hard no-ops when these are empty,
    # so an unset secret simply disables shipping -- but they must be PRESENT here,
    # or staging silently loses Sentry + OTel the way the pre-Kamal TF vars did not.
    - SENTRY_DSN_BACKEND
    - OTEL_LOGS_EXPORTER_ENDPOINT
    - OTEL_LOGS_EXPORTER_BEARER_TOKEN

# Staging's data stores run as Kamal accessories on the same droplet (throwaway;
# they hold nothing durable). Production instead points DATABASE_HOST at the
# Terraform-managed Managed Postgres and ships no db accessory.
accessories:
  db:
    image: postgres:16
    host: <%= ENV["STAGING_HOST"] %>
    env:
      clear:
        POSTGRES_USER: zimmer
        # Matches database.yml's `staging:` section. db:prepare creates
        # zimmer_staging_cable too (POSTGRES_USER is the cluster superuser).
        POSTGRES_DB: zimmer_staging
      secret:
        - POSTGRES_PASSWORD
    volumes:
      - zimmer_pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7
    host: <%= ENV["STAGING_HOST"] %>
    volumes:
      - zimmer_redisdata:/data
