# Example credentials file
# To edit the actual encrypted credentials:
# $ EDITOR="code --wait" bin/rails credentials:edit
#
# This will decrypt config/credentials.yml.enc using config/master.key
# and open it in your editor for editing.

# Required: Rails secret key base (auto-generated)
secret_key_base: your_secret_key_base_here

# Optional: GitHub Personal Access Token for cloning private repositories
# This should be a fine-grained access token or classic PAT with 'repo' scope
# Generate at: https://github.com/settings/tokens
github:
  personal_access_token: ghp_your_token_here

# The GitHub PAT is used by the execution layer when cloning repositories
# If not set, only public repositories can be cloned

# Optional: VAPID keys for Web Push notifications
# Generate keys with: bin/rails webpush:generate_keys
# Required for push notification functionality (PWA)
webpush:
  public_key: your_vapid_public_key_here
  private_key: your_vapid_private_key_here
  subject: mailto:admin@yourdomain.com
