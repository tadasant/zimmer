# Database Configuration
#
# This application uses PostgreSQL exclusively.
#
# PostgreSQL Configuration:
#   - Default port is 5432 (standard PostgreSQL port)
#   - macOS Postgres.app users: set DATABASE_PORT=5450 in your .env file
#   - Requires pg gem: gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  # The connection pool must cover the worker's GoodJob scheduler threads
  # (agents:16 + pollers:3 + triggers:2 + default:4 = 25) plus GoodJob's
  # persistent notifier connection and transient cron/main-thread usage.
  # Fallback default is 28 (25 threads + ~3 overhead). Ample headroom exists on
  # the server (Postgres max_connections=100, typical usage ~22). Set
  # RAILS_MAX_THREADS to override (it also sizes Puma's web thread pool).
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 28 } %>
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  port: <%= ENV.fetch("DATABASE_PORT", "5432") %>
  username: <%= ENV.fetch("DATABASE_USERNAME", ENV['USER']) %>
  password: <%= ENV["DATABASE_PASSWORD"] %>
  # "prefer" uses TLS when the server offers it and falls back when it does not,
  # which is what local dev, CI, and the compose Postgres on the staging droplet
  # need. Managed providers (e.g. DigitalOcean Managed Postgres) require TLS, so
  # those deployments set DATABASE_SSLMODE=require.
  sslmode: <%= ENV.fetch("DATABASE_SSLMODE", "prefer") %>

development:
  primary:
    <<: *default
    database: zimmer_development
  cable:
    <<: *default
    database: zimmer_development_cable
    migrations_paths: db/cable_migrate

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  primary:
    <<: *default
    database: zimmer_test
  cable:
    <<: *default
    database: zimmer_test_cable
    migrations_paths: db/cable_migrate

staging:
  primary:
    <<: *default
    database: zimmer_staging
  cable:
    <<: *default
    database: zimmer_staging_cable
    migrations_paths: db/cable_migrate

production:
  primary:
    <<: *default
    database: zimmer_production
  cable:
    <<: *default
    database: zimmer_production_cable
    migrations_paths: db/cable_migrate
