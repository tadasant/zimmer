# Database Configuration
#
# This application uses PostgreSQL exclusively.
#
# PostgreSQL Configuration:
#   - Default port is 5432 (standard PostgreSQL port)
#   - macOS Postgres.app users: set DATABASE_PORT=5450 in your .env file
#   - Requires pg gem: gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  # Derived, never a literal. Zimmer runs two roles (`web`, `worker`) against two
  # databases (`primary`, `cable`), and those four pools have four different right
  # answers -- a single flat number is correct for at most one of them and overcommits
  # the rest against a database with a hard connection ceiling. ConnectionBudget
  # (config/connection_budget.rb) derives each from Puma's threads and GoodJob's
  # scheduler threads, and states the server-side budget the whole deployment needs.
  # Read it before changing anything here.
  pool: <%= ConnectionBudget.primary_pool %>
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  port: <%= ENV.fetch("DATABASE_PORT", "5432") %>
  username: <%= ENV.fetch("DATABASE_USERNAME", ENV['USER']) %>
  password: <%= ENV["DATABASE_PASSWORD"] %>
  # "prefer" uses TLS when the server offers it and falls back when it does not,
  # which is what local dev, CI, and the compose Postgres on the staging droplet
  # need. Managed providers (e.g. DigitalOcean Managed Postgres) require TLS, so
  # those deployments set DATABASE_SSLMODE=require.
  sslmode: <%= ENV.fetch("DATABASE_SSLMODE", "prefer") %>

development:
  primary:
    <<: *default
    database: zimmer_development
  cable:
    <<: *default
    database: zimmer_development_cable
    # Deliberately not the primary pool's size: solid_cable takes no advisory lock, so a
    # cable connection is leased per INSERT rather than held for a job. See ConnectionBudget.
    pool: <%= ConnectionBudget.cable_pool %>
    migrations_paths: db/cable_migrate

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
