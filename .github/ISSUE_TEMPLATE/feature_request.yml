name: 💡 Feature request
description: Propose a capability or change. Concrete, motivated proposals get triaged; wishlists get closed.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Zimmer **does not accept pull requests**, but a sharp feature request can still shape the roadmap.
        The bar: a specific problem, a specific proposal, and evidence you've looked at how Zimmer works today.

        **Writing this with an AI agent?** Welcome — but ground every claim in the actual repo. Cite real
        files, real behavior, and real precedent. Do not invent APIs, config keys, or history.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that Zimmer makes hard or impossible today? Describe the concrete situation, not the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should Zimmer do instead? Be specific — the shape of the API, UI, config, or workflow you have in mind.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who benefits and how much? Is this a papercut or a blocker? Roughly how common is the situation?
    validations:
      required: true
  - type: textarea
    id: precedent
    attributes:
      label: Precedent
      description: >-
        Is there any precedent for this anywhere in the repo or its history — an existing issue, PR, commit,
        docs page, a half-built seam, or a Known-limitations entry that names it? Link what you found, or state
        that you searched and found none.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds exist today, and why are they insufficient?
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and the docs and this is not already proposed or covered.
          required: true
        - label: I understand Zimmer does not accept pull requests, and I am proposing the idea rather than submitting an implementation.
          required: true
