name: Teardown staging

# MANUAL-ONLY now. Staging is a PERSISTENT droplet that Kamal deploys onto, so it
# is no longer destroyed nightly -- that recreate-every-day churn is exactly what
# the Kamal migration removed. Run this only when you deliberately want to tear
# staging down (e.g. to stop billing for a while); `Deploy staging` stands it back
# up.
#
# With remote state, teardown is a clean `terraform destroy` -- no raw DO API reap
# of account-unique names, because Terraform now tracks exactly what it created.
on:
  workflow_dispatch: {}

concurrency:
  # Shared with `Deploy staging` so teardown and deploy can never run concurrently.
  group: staging-lifecycle
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  teardown:
    runs-on: self-hosted
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: Terraform destroy (staging)
        working-directory: infra/terraform
        env:
          TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY }}
          TF_VAR_deploy_ssh_pubkey: ${{ secrets.KAMAL_SSH_PUBKEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          terraform init -input=false \
            -backend-config=backend.staging.hcl
          cp staging.tfvars.example staging.tfvars
          terraform destroy -input=false -auto-approve \
            -var-file=staging.tfvars

      - name: Reap stale tailnet node
        env:
          TS_API_CLIENT_ID: ${{ secrets.TS_API_CLIENT_ID }}
          TS_API_CLIENT_SECRET: ${{ secrets.TS_API_CLIENT_SECRET }}
        run: bash scripts/tailnet-reap-node.sh zimmer-staging
