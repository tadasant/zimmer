name: Teardown staging

# Destroys the staging droplet + firewall nightly so an idle staging box does not
# bill 24/7. NOTE: a *powered-off* DigitalOcean droplet is STILL billed (its disk,
# CPU, RAM and IP stay reserved) -- only destroying it stops the charge. A `Deploy
# staging` run recreates it on demand, so "off by default, spin up when needed" is
# achieved by destroy + redeploy, not shutdown.
#
# Also deletes the leftover tailnet node so the next deploy reclaims the clean
# `zimmer-staging` MagicDNS name.
on:
  schedule:
    - cron: "0 8 * * *" # 08:00 UTC daily (~00:00 PT / 03:00 ET)
  workflow_dispatch: {}

concurrency:
  # Shared with `Deploy staging` so teardown and deploy can never run concurrently.
  group: staging-lifecycle
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  teardown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Destroy staging droplet + firewall
        env:
          DO_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          api() { curl -fsS -H "Authorization: Bearer $DO_TOKEN" "$@"; }
          n=0
          for d in $(api "https://api.digitalocean.com/v2/droplets?tag_name=zimmer-staging" | jq -r '.droplets[].id'); do
            echo "destroying droplet $d"; api -X DELETE "https://api.digitalocean.com/v2/droplets/$d" || true; n=$((n+1))
          done
          for fw in $(api "https://api.digitalocean.com/v2/firewalls" | jq -r '.firewalls[] | select(.name=="zimmer-staging") | .id'); do
            echo "destroying firewall $fw"; api -X DELETE "https://api.digitalocean.com/v2/firewalls/$fw" || true
          done
          echo "destroyed $n staging droplet(s); billing for them stops now."

      - name: Reap stale tailnet node
        env:
          TS_API_CLIENT_ID: ${{ secrets.TS_API_CLIENT_ID }}
          TS_API_CLIENT_SECRET: ${{ secrets.TS_API_CLIENT_SECRET }}
        run: bash scripts/tailnet-reap-node.sh zimmer-staging
