name: Deploy staging

# Manually-invoked ONLY. Stands up / updates the staging instance at
# staging.zimmer.tadasant.com from the chosen ref. Never auto-deploys.
#
# Self-contained: builds the base + app image from the checked-out ref and pushes
# them to GHCR, then Terraform-applies the DigitalOcean droplet (Tailscale-only)
# and health-checks the app over the tailnet. All secrets come from GitHub Actions
# secrets — none are in git.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch/tag/SHA to build & deploy"
        required: false
        default: ""

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Resolve image tag
        id: img
        run: echo "tag=staging-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          push: true
          tags: ghcr.io/tadasant/zimmer-base:staging
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max,scope=base

      - name: Build & push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            BASE_IMAGE=ghcr.io/tadasant/zimmer-base:staging
          push: true
          tags: |
            ghcr.io/tadasant/zimmer:${{ steps.img.outputs.tag }}
            ghcr.io/tadasant/zimmer:staging-latest
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      # The deploy runs with ephemeral tfstate (no remote backend configured), so a
      # re-run can't reconcile the previous run's resources. DO firewall names are
      # account-unique, so a leftover `zimmer-staging` firewall makes the next
      # `terraform apply` fail with 409 duplicate name. Delete any prior
      # zimmer-staging droplet + firewall first so each run starts clean. Idempotent.
      - name: Reap prior staging resources (ephemeral tfstate)
        env:
          DO_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          api() { curl -fsS -H "Authorization: Bearer $DO_TOKEN" "$@"; }
          for d in $(api "https://api.digitalocean.com/v2/droplets?tag_name=zimmer-staging" | jq -r '.droplets[].id'); do
            echo "reaping droplet $d"; api -X DELETE "https://api.digitalocean.com/v2/droplets/$d" || true
          done
          for fw in $(api "https://api.digitalocean.com/v2/firewalls" | jq -r '.firewalls[] | select(.name=="zimmer-staging") | .id'); do
            echo "reaping firewall $fw"; api -X DELETE "https://api.digitalocean.com/v2/firewalls/$fw" || true
          done
          sleep 5

      - name: Terraform apply (staging)
        working-directory: infra/terraform
        env:
          TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY }}
          TF_VAR_ghcr_username: ${{ github.actor }}
          TF_VAR_ghcr_token: ${{ secrets.GHCR_PULL_TOKEN }}
          TF_VAR_secret_key_base: ${{ secrets.STAGING_SECRET_BASE }}
          # Optional observability — leave the secrets unset to keep obs off.
          TF_VAR_otel_logs_endpoint: ${{ secrets.OTEL_LOGS_EXPORTER_ENDPOINT }}
          TF_VAR_otel_logs_token: ${{ secrets.OTEL_LOGS_EXPORTER_BEARER_TOKEN }}
          TF_VAR_sentry_dsn: ${{ secrets.SENTRY_DSN_BACKEND }}
        run: |
          set -euo pipefail
          IMG="ghcr.io/tadasant/zimmer:${{ steps.img.outputs.tag }}"
          terraform init -input=false
          cp staging.tfvars.example staging.tfvars
          terraform apply -input=false -auto-approve \
            -var-file=staging.tfvars \
            -var="image_ref=${IMG}"
          terraform output -raw droplet_ipv4 > /tmp/droplet_ip
          echo "Droplet IP: $(cat /tmp/droplet_ip)"

      # Join the tailnet LAST — right before the health check — so the runner's
      # ephemeral tailnet session is alive only for the (short) health check and
      # can't log out during the image build + terraform apply (which is what
      # broke earlier runs: `tailscale status` reported "Logged out" by the time
      # the health check ran).
      - name: Tailscale
        uses: tailscale/github-action@v3
        with:
          # Use a pre-minted, tag:ci-tagged auth key (the OAuth client is not
          # permitted to mint tag:ci keys — "requested tags [tag:ci] are invalid
          # or not permitted"). The key is already tagged, so no `tags:` input.
          authkey: ${{ secrets.TS_CI_AUTHKEY }}

      - name: Health check (over tailnet)
        run: |
          # The app publishes port 80 (tailnet-only; the DO firewall drops public
          # :80), so we reach it over the tailnet. GitHub runners do NOT get
          # MagicDNS in /etc/resolv.conf, so `curl http://zimmer-staging` can't
          # resolve the name — resolve the droplet's tailnet IP from
          # `tailscale status --json` and curl that instead.
          if ! tailscale status >/dev/null 2>&1; then
            echo "::error::Tailscale is not up on the runner (\`tailscale status\` reports logged out)."
            echo "This is a runner/tailnet-auth issue, not the app. Check the TS_OAUTH_CLIENT_ID/SECRET"
            echo "GitHub secrets and that the OAuth client has the auth_keys scope + tag:ci in the ACL"
            echo "tagOwners, and that the minted ephemeral key TTL exceeds the deploy duration."
            tailscale status 2>&1 || true
            exit 1
          fi
          for i in $(seq 1 40); do
            # There can be more than one online peer named "zimmer-staging" —
            # ephemeral tailnet nodes from prior deploys linger briefly after their
            # droplet is destroyed. Try EVERY online candidate and succeed if any
            # serves /up, so a stale IP can't mask the live droplet.
            ips=$(tailscale status --json 2>/dev/null \
              | jq -r '.Peer[]? | select(.HostName=="zimmer-staging" and .Online==true) | .TailscaleIPs[0]')
            for ip in $ips; do
              if curl -fsS --max-time 5 "http://$ip/up" >/dev/null 2>&1; then
                echo "✅ Staging healthy at http://$ip/up (zimmer-staging)"; exit 0
              fi
            done
            echo "waiting for app to come up ($i/40, candidates='$(echo $ips | tr '\n' ' ')')…"
            sleep 15
          done
          echo "::error::Health check did not pass in time"
          echo "--- tailscale status ---"; tailscale status 2>&1 || true
          exit 1
