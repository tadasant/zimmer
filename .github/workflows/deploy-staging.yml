name: Deploy staging

# Manually-invoked ONLY. Builds the app image from the chosen ref, Terraform-applies
# the PERSISTENT staging droplet (Tailscale-only), and deploys the app onto it with
# Kamal (health-gated zero-downtime swap + one-command rollback). Never auto-deploys.
#
# This replaces the old reap-and-recreate flow: Terraform now reconciles a long-lived
# droplet through remote state (no raw DO API reap of account-unique names), and app
# changes ride Kamal instead of re-rendering cloud-init and force-replacing the box.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch/tag/SHA to build & deploy"
        required: false
        default: ""

concurrency:
  group: staging-lifecycle
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Resolve image tag
        id: img
        run: echo "tag=staging-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          push: true
          tags: ghcr.io/tadasant/zimmer-base:staging
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max,scope=base

      - name: Build & push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            BASE_IMAGE=ghcr.io/tadasant/zimmer-base:staging
          push: true
          tags: |
            ghcr.io/tadasant/zimmer:${{ steps.img.outputs.tag }}
            ghcr.io/tadasant/zimmer:staging-latest
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      # Provision (or reconcile) the persistent staging droplet + reserved IP through
      # remote state. Idempotent: a re-run updates in place, it does NOT recreate.
      - name: Terraform apply (staging)
        working-directory: infra/terraform
        env:
          TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY }}
          TF_VAR_deploy_ssh_pubkey: ${{ secrets.KAMAL_SSH_PUBKEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          terraform init -input=false -backend-config=backend.staging.hcl
          cp staging.tfvars.example staging.tfvars
          terraform apply -input=false -auto-approve -var-file=staging.tfvars

      # Join the tailnet so we can resolve the droplet's tailnet IP, SSH to it with
      # Kamal, and health-check the app.
      - name: Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_CI_AUTHKEY }}

      # GitHub runners get no MagicDNS, so resolve zimmer-staging's tailnet IP from
      # `tailscale status`, and load the Kamal deploy key.
      - name: Prepare Kamal SSH + resolve host
        id: host
        env:
          KAMAL_SSH_KEY: ${{ secrets.KAMAL_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$KAMAL_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat > ~/.ssh/config <<'EOF'
          Host *
            StrictHostKeyChecking accept-new
            UserKnownHostsFile /dev/null
            IdentityFile ~/.ssh/id_ed25519
          EOF
          for i in $(seq 1 40); do
            ip=$(tailscale status --json 2>/dev/null \
              | jq -r '.Peer[]? | select(.HostName=="zimmer-staging" and .Online==true) | .TailscaleIPs[0]' \
              | head -1)
            if [ -n "${ip:-}" ] && [ "$ip" != "null" ]; then
              echo "staging_host=$ip" >> "$GITHUB_OUTPUT"
              echo "resolved zimmer-staging -> $ip"
              exit 0
            fi
            echo "waiting for zimmer-staging on the tailnet ($i/40)…"
            sleep 15
          done
          echo "::error::zimmer-staging never came online on the tailnet"
          exit 1

      # Ruby matching .ruby-version, with a user-writable gem dir. (The runner's stock
      # system Ruby installs into /var/lib/gems, which needs root -- `gem install`
      # there fails with Gem::FilePermissionError.)
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ".ruby-version"
          bundler-cache: false

      # Pin Kamal to the exact version the repo locks (Gemfile.lock) so CI can't drift
      # onto a different 2.x. Installed standalone rather than via `bundle install`,
      # which would build the app's native gems (pg, nokogiri) on the runner for no
      # reason -- the deploy only needs Kamal itself.
      - name: Install Kamal (pinned to Gemfile.lock)
        run: |
          set -euo pipefail
          v=$(awk '/^    kamal \(/{gsub(/[()]/,"");print $2; exit}' Gemfile.lock)
          echo "installing kamal ${v} (from Gemfile.lock)"
          gem install kamal -v "$v" --no-document
          kamal version

      # Deploy onto the persistent host. `accessory boot` is already idempotent in
      # Kamal 2 (it skips a container that exists), so this is NOT `|| true`-guarded:
      # a genuine failure here (registry login, image pull, bad DB password) must fail
      # the deploy loudly instead of surfacing later as an opaque health-check timeout.
      # The image was built above, so --skip-push just pulls the existing tag.
      - name: Kamal deploy (staging)
        env:
          STAGING_HOST: ${{ steps.host.outputs.staging_host }}
          KAMAL_REGISTRY_USERNAME: ${{ github.actor }}
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GHCR_PULL_TOKEN }}
          STAGING_SECRET_BASE: ${{ secrets.STAGING_SECRET_BASE }}
          STAGING_API_KEYS: ${{ secrets.STAGING_API_KEYS }}
          STAGING_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          SENTRY_DSN_BACKEND: ${{ secrets.SENTRY_DSN_BACKEND }}
          OTEL_LOGS_EXPORTER_ENDPOINT: ${{ secrets.OTEL_LOGS_EXPORTER_ENDPOINT }}
          OTEL_LOGS_EXPORTER_BEARER_TOKEN: ${{ secrets.OTEL_LOGS_EXPORTER_BEARER_TOKEN }}
        run: |
          set -euo pipefail
          kamal accessory boot all -d staging
          kamal deploy -d staging \
            --version="${{ steps.img.outputs.tag }}" \
            --skip-push

      # kamal-proxy already health-gated the cutover host-side. Re-verify from the
      # tailnet, and assert the WORKER is genuinely healthy too -- the worker is where
      # agent sessions actually execute, and mere presence in `docker ps` is not
      # enough: a worker crash-looping on a bad DB password still shows up there
      # (Restarting), so we assert Running AND a stable RestartCount.
      - name: Verify web + worker over the tailnet
        env:
          STAGING_HOST: ${{ steps.host.outputs.staging_host }}
        run: |
          set -euo pipefail
          for i in $(seq 1 20); do
            if curl -fsS --max-time 5 "http://${STAGING_HOST}/up" >/dev/null 2>&1; then
              echo "✅ web healthy at http://${STAGING_HOST}/up"
              echo "--- containers on the droplet ---"
              ssh root@"${STAGING_HOST}" 'docker ps --format "{{.Names}}\t{{.Status}}"'

              w=$(ssh root@"${STAGING_HOST}" \
                'docker ps --filter "name=zimmer-worker" --format "{{.Names}}" | head -1')
              if [ -z "$w" ]; then
                echo "::error::web is up but no worker container exists"
                exit 1
              fi
              # Settle, then require Running=true and no further restarts.
              r1=$(ssh root@"${STAGING_HOST}" "docker inspect -f '{{.RestartCount}}' $w")
              sleep 20
              state=$(ssh root@"${STAGING_HOST}" "docker inspect -f '{{.State.Running}}' $w")
              r2=$(ssh root@"${STAGING_HOST}" "docker inspect -f '{{.RestartCount}}' $w")
              echo "worker=$w running=$state restarts=$r1->$r2"
              if [ "$state" != "true" ] || [ "$r1" != "$r2" ]; then
                echo "::error::worker $w is not stably running (running=$state, restarts $r1->$r2)"
                ssh root@"${STAGING_HOST}" "docker logs --tail 40 $w" || true
                exit 1
              fi
              echo "✅ worker stably running"
              exit 0
            fi
            echo "waiting for app ($i/20)…"
            sleep 15
          done
          echo "::error::Health check did not pass in time"
          exit 1

  # Re-point the `staging.zimmer.tadasant.com` A record at the (possibly new) tailnet
  # IP and push a real cert. Without this, a freshly-provisioned droplet serves only
  # cloud-init's self-signed bootstrap cert and the A record still points at the old
  # box -- and APP_HOST is that domain, so every generated URL and OAuth callback
  # breaks. Idempotent: the script no-ops issuance when the cert is valid >30 days.
  cert:
    needs: deploy
    uses: ./.github/workflows/domain-cert-staging.yml
    secrets: inherit
