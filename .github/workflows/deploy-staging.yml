name: Deploy staging

# Manually-invoked ONLY. Builds the app image from the chosen ref, Terraform-applies
# the PERSISTENT staging droplet (Tailscale-only), and deploys the app onto it with
# Kamal (health-gated zero-downtime swap + one-command rollback). Never auto-deploys.
#
# This replaces the old reap-and-recreate flow: Terraform now reconciles a long-lived
# droplet through remote state (no raw DO API reap of account-unique names), and app
# changes ride Kamal instead of re-rendering cloud-init and force-replacing the box.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch/tag/SHA to build & deploy"
        required: false
        default: ""
      recreate_droplet:
        description: >-
          Force-rebuild the droplet (terraform -replace). Needed ONLY when the
          bootstrap itself must change -- rotating the Kamal deploy key, changing the
          domain/Caddyfile -- because `ignore_changes = [user_data]` deliberately
          hides those from the plan. Normal app deploys must leave this off.
        type: boolean
        required: false
        default: false

concurrency:
  group: staging-lifecycle
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: self-hosted
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Resolve image tag
        id: img
        run: echo "tag=staging-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          push: true
          tags: ghcr.io/tadasant/zimmer-base:staging
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max,scope=base

      - name: Build & push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            BASE_IMAGE=ghcr.io/tadasant/zimmer-base:staging
          push: true
          tags: |
            ghcr.io/tadasant/zimmer:${{ steps.img.outputs.tag }}
            ghcr.io/tadasant/zimmer:staging-latest
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      # Only when rebuilding the droplet: free the `zimmer-staging` MagicDNS name, so
      # the replacement reclaims it instead of registering as zimmer-staging-1. On a
      # normal deploy the droplet persists and its node must NOT be reaped.
      - name: Reap stale tailnet node (only when recreating)
        if: ${{ inputs.recreate_droplet }}
        env:
          TS_API_CLIENT_ID: ${{ secrets.TS_API_CLIENT_ID }}
          TS_API_CLIENT_SECRET: ${{ secrets.TS_API_CLIENT_SECRET }}
        run: bash scripts/tailnet-reap-node.sh zimmer-staging

      # Provision (or reconcile) the persistent staging droplet + reserved IP through
      # remote state. Idempotent: a re-run updates in place, it does NOT recreate --
      # unless recreate_droplet forces -replace (see the input's description).
      - name: Terraform apply (staging)
        working-directory: infra/terraform
        env:
          TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY }}
          TF_VAR_deploy_ssh_pubkey: ${{ secrets.KAMAL_SSH_PUBKEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          terraform init -input=false -backend-config=backend.staging.hcl
          cp staging.tfvars.example staging.tfvars
          replace=""
          if [ "${{ inputs.recreate_droplet }}" = "true" ]; then
            echo "::warning::recreate_droplet=true — replacing the droplet (bootstrap change)."
            replace="-replace=digitalocean_droplet.zimmer"
          fi
          terraform apply -input=false -auto-approve -var-file=staging.tfvars $replace

      # Join the tailnet so we can resolve the droplet's tailnet IP, SSH to it with
      # Kamal, and health-check the app.
      - name: Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_CI_AUTHKEY }}

      # GitHub runners get no MagicDNS, so resolve zimmer-staging's tailnet IP from
      # `tailscale status`, and load the Kamal deploy key.
      - name: Prepare Kamal SSH + resolve host
        id: host
        env:
          KAMAL_SSH_KEY: ${{ secrets.KAMAL_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$KAMAL_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat > ~/.ssh/config <<'EOF'
          Host *
            StrictHostKeyChecking accept-new
            UserKnownHostsFile /dev/null
            IdentityFile ~/.ssh/id_ed25519
          EOF
          for i in $(seq 1 40); do
            ip=$(tailscale status --json 2>/dev/null \
              | jq -r '.Peer[]? | select(.HostName=="zimmer-staging" and .Online==true) | .TailscaleIPs[0]' \
              | head -1)
            if [ -n "${ip:-}" ] && [ "$ip" != "null" ]; then
              echo "staging_host=$ip" >> "$GITHUB_OUTPUT"
              echo "resolved zimmer-staging -> $ip"
              exit 0
            fi
            echo "waiting for zimmer-staging on the tailnet ($i/40)…"
            sleep 15
          done
          echo "::error::zimmer-staging never came online on the tailnet"
          exit 1

      # Ruby matching .ruby-version, with a user-writable gem dir. (The runner's stock
      # system Ruby installs into /var/lib/gems, which needs root -- `gem install`
      # there fails with Gem::FilePermissionError.)
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ".ruby-version"
          bundler-cache: false
          self-hosted: true

      # Pin Kamal to the exact version the repo locks (Gemfile.lock) so CI can't drift
      # onto a different 2.x. Installed standalone rather than via `bundle install`,
      # which would build the app's native gems (pg, nokogiri) on the runner for no
      # reason -- the deploy only needs Kamal itself.
      - name: Install Kamal (pinned to Gemfile.lock)
        run: |
          set -euo pipefail
          v=$(awk '/^    kamal \(/{gsub(/[()]/,"");print $2; exit}' Gemfile.lock)
          echo "installing kamal ${v} (from Gemfile.lock)"
          gem install kamal -v "$v" --no-document
          kamal version

      # Deploy onto the persistent host. `accessory boot` is already idempotent in
      # Kamal 2 (it skips a container that exists), so this is NOT `|| true`-guarded:
      # a genuine failure here (registry login, image pull, bad DB password) must fail
      # the deploy loudly instead of surfacing later as an opaque health-check timeout.
      # The image was built above, so --skip-push just pulls the existing tag.
      - name: Kamal deploy (staging)
        env:
          STAGING_HOST: ${{ steps.host.outputs.staging_host }}
          KAMAL_REGISTRY_USERNAME: ${{ github.actor }}
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GHCR_PULL_TOKEN }}
          STAGING_SECRET_BASE: ${{ secrets.STAGING_SECRET_BASE }}
          STAGING_API_KEYS: ${{ secrets.STAGING_API_KEYS }}
          STAGING_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          STAGING_RAILS_MASTER_KEY: ${{ secrets.STAGING_RAILS_MASTER_KEY }}
          # Observability. STAGING_-prefixed on purpose -- see .kamal/secrets.staging.
          # STAGING_SENTRY_DSN_BACKEND must be the DSN of a SEPARATE GlitchTip project
          # (zimmer-staging), never production's: GlitchTip's Slack alert has no
          # environment filter, so a shared DSN makes every staging error page #alerts.
          STAGING_SENTRY_DSN_BACKEND: ${{ secrets.STAGING_SENTRY_DSN_BACKEND }}
          STAGING_OTEL_LOGS_EXPORTER_ENDPOINT: ${{ secrets.STAGING_OTEL_LOGS_EXPORTER_ENDPOINT }}
          STAGING_OTEL_LOGS_EXPORTER_BEARER_TOKEN: ${{ secrets.STAGING_OTEL_LOGS_EXPORTER_BEARER_TOKEN }}
        run: |
          set -euo pipefail
          # API_KEYS is a comma-separated list; the injected self-session MCP server
          # needs a SINGLE key to call this instance's own REST API.
          export STAGING_SELF_API_KEY="${STAGING_API_KEYS%%,*}"
          if [ -z "$STAGING_SELF_API_KEY" ]; then
            echo "::error::STAGING_API_KEYS is empty, so ZIMMER_STAGING_API_KEY would be blank."
            echo "::error::SecretsInterpolator treats blank-but-set exactly like unset, so every session"
            echo "::error::would fail with MissingVariableError -- the bug this wiring exists to prevent."
            exit 1
          fi
          # RAILS_MASTER_KEY is deliberately NOT fatal, unlike the key above. It decrypts
          # config/credentials/staging.yml.enc, and ActiveSupport reads it as
          # `ENV["RAILS_MASTER_KEY"].presence` -- so blank behaves exactly like unset: the
          # credentials stay inert and the app still boots healthy. Failing here would turn
          # a degraded deploy into a broken one for anyone (a fork, a self-hoster) who has
          # not set the secret.
          if [ -z "${STAGING_RAILS_MASTER_KEY:-}" ]; then
            echo "::warning::STAGING_RAILS_MASTER_KEY is unset, so config/credentials/staging.yml.enc stays encrypted."
            echo "::warning::Staging will boot, but SecretsLoader serves nothing: Slack triggers and AlertService"
            echo "::warning::go quiet, and every MCP server with a \${VAR} from mcp_secrets fails to start a session."
          fi
          # Observability preflight. Also non-fatal -- both initializers are hard
          # no-ops on an empty value, so staging boots fine without them. But an
          # unset obs secret is otherwise INVISIBLE: the app logs nothing, Kamal
          # reports success, and the only symptom is an empty Grafana. Print the state
          # on every deploy so "staging ships no telemetry" is a line you can read,
          # not a thing you have to go discover.
          #
          # Report only whether each secret is SET, never its value. These arrive from
          # `secrets.*`, and GitHub masks a secret's value anywhere in the log -- so
          # echoing the endpoint would print `***` and tell you nothing, while any
          # attempt to print a "safe substring" of the DSN would be one malformed value
          # away from leaking the whole thing. Set/unset is the entire question here
          # anyway; `bin/rails obs:status` on the box reports the endpoint.
          echo "--- observability preflight ---"
          if [ -n "${STAGING_OTEL_LOGS_EXPORTER_ENDPOINT:-}" ] && [ -n "${STAGING_OTEL_LOGS_EXPORTER_BEARER_TOKEN:-}" ]; then
            echo "✅ OTLP logs ON (endpoint + bearer token set; deployment.environment=staging)"
          else
            echo "::warning::OTLP logs are OFF: set BOTH STAGING_OTEL_LOGS_EXPORTER_ENDPOINT and"
            echo "::warning::STAGING_OTEL_LOGS_EXPORTER_BEARER_TOKEN. Either one missing is a silent no-op,"
            echo "::warning::and staging logs will never reach VictoriaLogs."
          fi
          if [ -n "${STAGING_SENTRY_DSN_BACKEND:-}" ]; then
            echo "✅ GlitchTip errors ON (DSN set -- it must be a STAGING-only project)"
          else
            echo "::warning::GlitchTip errors are OFF: STAGING_SENTRY_DSN_BACKEND is unset."
          fi
          echo "-------------------------------"
          kamal accessory boot all -d staging
          kamal deploy -d staging \
            --version="${{ steps.img.outputs.tag }}" \
            --skip-push

      # kamal-proxy already health-gated the cutover host-side. Re-verify from the
      # tailnet, and assert the WORKER is genuinely healthy too -- the worker is where
      # agent sessions actually execute, and mere presence in `docker ps` is not
      # enough: a worker crash-looping on a bad DB password still shows up there
      # (Restarting), so we assert Running AND a stable RestartCount.
      - name: Verify web + worker over the tailnet
        env:
          STAGING_HOST: ${{ steps.host.outputs.staging_host }}
        run: |
          set -euo pipefail
          for i in $(seq 1 20); do
            if curl -fsS --max-time 5 "http://${STAGING_HOST}/up" >/dev/null 2>&1; then
              echo "✅ web healthy at http://${STAGING_HOST}/up"
              echo "--- containers on the droplet ---"
              ssh root@"${STAGING_HOST}" 'docker ps --format "{{.Names}}\t{{.Status}}"'

              w=$(ssh root@"${STAGING_HOST}" \
                'docker ps --filter "name=zimmer-worker" --format "{{.Names}}" | head -1')
              if [ -z "$w" ]; then
                echo "::error::web is up but no worker container exists"
                exit 1
              fi
              # Settle, then require Running=true and no further restarts.
              r1=$(ssh root@"${STAGING_HOST}" "docker inspect -f '{{.RestartCount}}' $w")
              sleep 20
              state=$(ssh root@"${STAGING_HOST}" "docker inspect -f '{{.State.Running}}' $w")
              r2=$(ssh root@"${STAGING_HOST}" "docker inspect -f '{{.RestartCount}}' $w")
              echo "worker=$w running=$state restarts=$r1->$r2"
              if [ "$state" != "true" ] || [ "$r1" != "$r2" ]; then
                echo "::error::worker $w is not stably running (running=$state, restarts $r1->$r2)"
                ssh root@"${STAGING_HOST}" "docker logs --tail 40 $w" || true
                exit 1
              fi
              echo "✅ worker stably running"
              exit 0
            fi
            echo "waiting for app ($i/20)…"
            sleep 15
          done
          echo "::error::Health check did not pass in time"
          exit 1

  # Re-point the `staging.zimmer.tadasant.com` A record at the (possibly new) tailnet
  # IP and push a real cert. Without this, a freshly-provisioned droplet serves only
  # cloud-init's self-signed bootstrap cert and the A record still points at the old
  # box -- and APP_HOST is that domain, so every generated URL and OAuth callback
  # breaks. Idempotent: the script no-ops issuance when the cert is valid >30 days.
  cert:
    needs: deploy
    uses: ./.github/workflows/domain-cert-staging.yml
    secrets: inherit
