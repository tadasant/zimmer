name: Release image

# On every push to main, build the app image and push it to GHCR with an
# auto-incremented PATCH version, plus :latest and the commit SHA.
#
# Versioning (deterministic, no commit-back required):
#   - The committed VERSION file is the MANUAL floor, e.g. "0.1.0".
#   - Effective version = MAJOR.MINOR.(BASE_PATCH + commits_since_VERSION_changed).
#   - To cut a MINOR or MAJOR bump: edit VERSION in a PR (e.g. 0.1.0 -> 0.2.0).
#     That commit touches VERSION, so the offset resets and the next image is
#     exactly the version you wrote; subsequent commits auto-bump the patch.
on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"

concurrency:
  group: release-image
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full history to count commits since VERSION changed

      - name: Compute version
        id: version
        run: |
          set -euo pipefail
          BASE=$(tr -d '[:space:]' < VERSION)
          MAJOR=$(echo "$BASE" | cut -d. -f1)
          MINOR=$(echo "$BASE" | cut -d. -f2)
          BASE_PATCH=$(echo "$BASE" | cut -d. -f3)
          # SHA of the last commit that modified VERSION (the manual floor).
          VERSION_SHA=$(git log -1 --format=%H -- VERSION)
          # Commits on main since that floor was set (0 on the floor commit itself).
          OFFSET=$(git rev-list --count "${VERSION_SHA}..HEAD")
          PATCH=$((BASE_PATCH + OFFSET))
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved image version: ${VERSION} (floor ${BASE}, +${OFFSET} commits)"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # The app image builds FROM ghcr.io/tadasant/zimmer-base:latest. Bootstrap it
      # if it does not exist yet, so the first release (and any release before the
      # "Build base image" workflow has ever run) does not fail with
      # "zimmer-base:latest: not found". Once present it is reused; rebuild it via
      # the monthly/manual "Build base image" workflow when Dockerfile.base changes.
      - name: Check for base image
        id: base
        run: |
          set -euo pipefail
          if docker buildx imagetools inspect ghcr.io/tadasant/zimmer-base:latest >/dev/null 2>&1; then
            echo "need_base=false" >> "$GITHUB_OUTPUT"
            echo "Base image present; reusing it."
          else
            echo "need_base=true" >> "$GITHUB_OUTPUT"
            echo "Base image missing; bootstrapping it from Dockerfile.base."
          fi

      - name: Build & push base image (bootstrap, only if missing)
        if: steps.base.outputs.need_base == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          push: true
          tags: ghcr.io/tadasant/zimmer-base:latest
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max,scope=base

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Uses the Zimmer base image (Node/Playwright/gh/gems), ensured to exist by
          # the bootstrap step above. The Dockerfile defaults BASE_IMAGE to
          # ghcr.io/tadasant/zimmer-base:latest.
          push: true
          tags: |
            ghcr.io/tadasant/zimmer:${{ steps.version.outputs.version }}
            ghcr.io/tadasant/zimmer:latest
            ghcr.io/tadasant/zimmer:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify tadasant-internal (instant prod cross)
        # Fire a repository_dispatch so tadasant-internal's auto-upgrade + IaC-sync
        # workflows run the instant a new image publishes, instead of waiting for
        # their polls. This NEVER fails the release: it is a no-op until the
        # GH_TADASANT_INTERNAL_DISPATCH_TOKEN secret is set (a PAT with Contents:write on
        # tadasant-internal -- the repository_dispatch API is gated by Contents write;
        # there is no separate "dispatch" scope), and a non-2xx response only warns --
        # prod still catches up on its own schedule.
        env:
          DISPATCH_TOKEN: ${{ secrets.GH_TADASANT_INTERNAL_DISPATCH_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          if [ -z "${DISPATCH_TOKEN:-}" ]; then
            echo "GH_TADASANT_INTERNAL_DISPATCH_TOKEN not set; skipping instant-cross dispatch."
            echo "(tadasant-internal still catches up via its scheduled polls.)"
            exit 0
          fi
          code=$(curl -sS -o /tmp/dispatch.out -w '%{http_code}' -X POST \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/tadasant/tadasant-internal/dispatches \
            -d "{\"event_type\":\"zimmer-image-published\",\"client_payload\":{\"version\":\"${VERSION}\",\"sha\":\"${GITHUB_SHA}\"}}") || true
          if [ "$code" = "204" ]; then
            echo "Dispatched zimmer-image-published to tadasant-internal (version ${VERSION})."
          else
            echo "::warning::repository_dispatch to tadasant-internal returned HTTP ${code}; prod will catch up on its schedule."
            cat /tmp/dispatch.out 2>/dev/null || true
          fi
