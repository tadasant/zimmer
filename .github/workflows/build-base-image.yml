name: Build base image

# Builds the heavy base image (Node.js, Playwright, gh CLI, gems) from
# Dockerfile.base and publishes it to ghcr.io/tadasant/zimmer-base:latest.
# The per-commit "Release image" workflow builds the app FROM this base, so the
# app build stays fast. Rebuild this when Dockerfile.base, the Ruby version, or
# heavy system deps change. Manual + monthly to pick up base OS security fixes.
on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 6 1 * *" # 06:00 UTC on the 1st of each month

permissions:
  contents: read
  packages: write

jobs:
  build-base:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          push: true
          tags: ghcr.io/tadasant/zimmer-base:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
