name: CI

# Standalone CI for the Zimmer Rails app. Runs on PulseMCP's shared self-hosted
# GitHub Actions runner pool (label `self-hosted`), which zimmer piggybacks on via
# repo-level runner registration to stay off the GitHub-hosted Actions minute quota.
# Postgres + Redis come up as service containers on *dynamic* host ports so
# concurrent jobs on the shared box never collide; gems install into a per-runner
# path for the same reason. This piggyback is temporary — see docs/operate/deploying.md
# ("The workflows") and the DigitalOcean migration tracker (tadasant-internal#25).
#
# NOTE on ruby/setup-ruby: we do NOT pass `self-hosted: true`. That input tells the
# action a Ruby is already staged in $RUNNER_TOOL_CACHE — true on pulsemcp's org
# runners (1-8), but the tadasant repo-level runners (tadasant-zimmer-ci-{1,2}) were
# registered without a seeded Ruby toolcache, so the action would abort. Omitting it
# lets setup-ruby self-install Ruby 3.4.6 into each runner's own $RUNNER_TOOL_CACHE;
# per-runner isolation comes from that per-runner cache dir, not from the flag. If the
# runner toolcaches are ever seeded (or the DO migration seeds them), re-add the flag.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.6"
          bundler-cache: false
      - name: Install gems (per-runner path)
        run: |
          RUNNER_NUM=$(echo "$RUNNER_NAME" | grep -oE '[0-9]+$' || echo "0")
          bundle config set --local path "/home/runner/.bundles/zimmer-runner-${RUNNER_NUM}"
          bundle install --jobs 4 --retry 3
      - name: Rubocop
        run: bin/rubocop -f github --parallel

  security:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.6"
          bundler-cache: false
      - name: Install gems (per-runner path)
        run: |
          RUNNER_NUM=$(echo "$RUNNER_NAME" | grep -oE '[0-9]+$' || echo "0")
          bundle config set --local path "/home/runner/.bundles/zimmer-runner-${RUNNER_NUM}"
          bundle install --jobs 4 --retry 3
      - name: Brakeman
        run: bin/brakeman --no-pager -q

  verify_lockfile:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.6"
          bundler-cache: false
      - name: Ensure Gemfile.lock is up to date
        run: |
          RUNNER_NUM=$(echo "$RUNNER_NAME" | grep -oE '[0-9]+$' || echo "0")
          bundle config set --local path "/home/runner/.bundles/zimmer-runner-${RUNNER_NUM}"
          bundle lock
          git diff --exit-code Gemfile.lock

  # Unit + integration suite (system tests are excluded — `bin/rails test` does not
  # descend into test/system). The job KEY is `test-unit`, which the shared runner's
  # heavy-test semaphore recognizes and gates; a bare `test` would go ungated. There
  # is deliberately no `test-system` job: zimmer, like its AO parent, does not run
  # Chrome-driven system tests in CI, so there is nothing for the system semaphore to
  # gate. PARALLEL_WORKERS is pinned so a shard cannot fan out to :number_of_processors
  # (32 on the box) and starve co-tenants.
  test-unit:
    runs-on: self-hosted

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zimmer_test
        ports:
          - 5432/tcp
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379/tcp
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_HOST: localhost
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      PARALLEL_WORKERS: 8

    steps:
      - uses: actions/checkout@v4
      - name: Resolve dynamic service ports
        run: |
          echo "DATABASE_PORT=${{ job.services.postgres.ports[5432] }}" >> "$GITHUB_ENV"
          echo "REDIS_URL=redis://localhost:${{ job.services.redis.ports[6379] }}" >> "$GITHUB_ENV"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.6"
          bundler-cache: false
      - name: Install gems (per-runner path)
        run: |
          RUNNER_NUM=$(echo "$RUNNER_NAME" | grep -oE '[0-9]+$' || echo "0")
          bundle config set --local path "/home/runner/.bundles/zimmer-runner-${RUNNER_NUM}"
          bundle install --jobs 4 --retry 3
      - name: Prepare test database
        run: bin/rails db:test:prepare
      - name: Run tests (unit + integration; system tests excluded)
        run: bin/rails test

  # Builds the Astro Starlight documentation site in docs/. Keeps the site from
  # silently rotting: a broken link, bad frontmatter, or a page missing from the
  # sidebar fails here rather than at deploy time. No Ruby needed — this is the
  # one Node-only job.
  docs_site:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - name: Install docs dependencies
        run: npm ci
        working-directory: docs
      - name: Build docs site
        run: npm run build
        working-directory: docs

  # Standalone unit tests for the GHCR retention selector. Pure Ruby, no Rails
  # boot required, so it runs fast and independently of the app suite.
  retention_logic:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.6"
      - name: Test GHCR retention selection logic
        run: ruby scripts/ghcr_retention_test.rb
