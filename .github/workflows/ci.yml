name: CI

# Standalone CI for the Zimmer Rails app. Runs on GitHub-hosted runners with
# Postgres + Redis service containers — no self-hosted runners, no AIR catalog
# machinery (that was monorepo-specific).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.6"
          bundler-cache: true
      - name: Rubocop
        run: bin/rubocop -f github --parallel

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.6"
          bundler-cache: true
      - name: Brakeman
        run: bin/brakeman --no-pager -q

  verify_lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.6"
          bundler-cache: true
      - name: Ensure Gemfile.lock is up to date
        run: |
          bundle lock
          git diff --exit-code Gemfile.lock

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agent_orchestrator_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.6"
          bundler-cache: true
      - name: Prepare test database
        run: bin/rails db:test:prepare
      - name: Run tests (unit + integration; system tests excluded)
        run: bin/rails test

  # Standalone unit tests for the GHCR retention selector. Pure Ruby, no Rails
  # boot required, so it runs fast and independently of the app suite.
  retention_logic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.6"
      - name: Test GHCR retention selection logic
        run: ruby scripts/ghcr_retention_test.rb
