# Fixture for MCP OAuth credentials used in tests
notion:
  server_name: notion
  server_url: https://mcp.notion.com/v1/mcp
  credential_key: "notion|abc123def456789"
  client_id: "agent-orchestrator-test"
  access_token: "test-access-token-12345"
  token_endpoint: "https://api.notion.com/v1/oauth/token"
  resource: "https://mcp.notion.com"
  expires_at: <%= 1.hour.from_now.to_formatted_s(:db) %>
  created_at: <%= Time.current.to_formatted_s(:db) %>
  updated_at: <%= Time.current.to_formatted_s(:db) %>

expired:
  server_name: expired-server
  server_url: https://expired.example.com/mcp
  credential_key: "expired-server|expired1234567"
  client_id: "test-client"
  access_token: "expired-access-token"
  token_endpoint: "https://expired.example.com/oauth/token"
  expires_at: <%= 1.hour.ago.to_formatted_s(:db) %>
  created_at: <%= 2.hours.ago.to_formatted_s(:db) %>
  updated_at: <%= 2.hours.ago.to_formatted_s(:db) %>

# Expired credential with refresh token - used to test token refresh before re-auth
expired_with_refresh:
  server_name: refreshable-server
  server_url: https://refreshable.example.com/mcp
  credential_key: "refreshable-server|refresh12345"
  client_id: "test-client"
  client_secret: "test-secret"
  access_token: "expired-access-token"
  refresh_token: "valid-refresh-token"
  token_endpoint: "https://refreshable.example.com/oauth/token"
  expires_at: <%= 1.hour.ago.to_formatted_s(:db) %>
  created_at: <%= 2.hours.ago.to_formatted_s(:db) %>
  updated_at: <%= 2.hours.ago.to_formatted_s(:db) %>

# Credential expiring soon (within 1 hour) - used to test proactive refresh cron job
expiring_soon:
  server_name: expiring-server
  server_url: https://expiring.example.com/mcp
  credential_key: "expiring-server|expiring12345"
  client_id: "test-client"
  client_secret: "test-secret"
  access_token: "soon-expiring-access-token"
  refresh_token: "valid-refresh-token-2"
  token_endpoint: "https://expiring.example.com/oauth/token"
  expires_at: <%= 30.minutes.from_now.to_formatted_s(:db) %>
  # updated_at predates PROACTIVE_REFRESH_MIN_INTERVAL so proactive refresh is not throttled
  created_at: <%= 6.hours.ago.to_formatted_s(:db) %>
  updated_at: <%= 5.hours.ago.to_formatted_s(:db) %>
