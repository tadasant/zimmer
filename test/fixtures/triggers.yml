# Test fixtures for Trigger model
# Note: trigger_type and configuration are now on TriggerCondition
# See trigger_conditions.yml for condition fixtures

enabled_slack_trigger:
  name: CI Failure Handler
  status: enabled
  agent_root_name: zimmer
  mcp_servers:
    - slack-workspace
  goal: PR is merged
  prompt_template: |
    There is a new message in Slack, channel #{{channel}}.

    Link: {{link}}

    Please review it and surrounding context.
  sessions_created_count: 5
  reuse_session: false

disabled_slack_trigger:
  name: Disabled Trigger
  status: disabled
  agent_root_name: zimmer
  mcp_servers: []
  prompt_template: "New message in {{channel}}: {{link}}"
  sessions_created_count: 0
  reuse_session: false

new_slack_trigger:
  name: New Trigger
  status: enabled
  agent_root_name: zimmer
  mcp_servers: []
  prompt_template: "Check deployment status: {{link}}"
  sessions_created_count: 0
  reuse_session: false

